<svg viewBox="0 0 900 510" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Repro-agent architecture: blind inputs, a generic role pipeline, and an independent verifier</title>
<desc>The agent receives the task, command, output contract and repository but not the target value. A pipeline of roles writes and repairs an evaluation program that emits per-sample predictions; an independent verifier recomputes the metric against pinned gold labels, producing a pass or a fail-closed rejection.</desc>
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#5F5E5A"/></marker>
<marker id="ahp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#534AB7"/></marker>
</defs>

<text x="40" y="34" font-size="17" font-weight="500" fill="#2C2C2A">repro-agent — blind run, independent verifier</text>

<text x="40" y="66" font-size="12.5" fill="#5F5E5A">what the agent is given</text>
<g font-size="13" fill="#2C2C2A">
<rect x="40" y="76" width="138" height="38" rx="4" fill="#F1EFE8" stroke="#888780"/><text x="109" y="100" text-anchor="middle">public task</text>
<rect x="190" y="76" width="138" height="38" rx="4" fill="#F1EFE8" stroke="#888780"/><text x="259" y="100" text-anchor="middle">run command</text>
<rect x="340" y="76" width="138" height="38" rx="4" fill="#F1EFE8" stroke="#888780"/><text x="409" y="100" text-anchor="middle">output contract</text>
<rect x="490" y="76" width="138" height="38" rx="4" fill="#F1EFE8" stroke="#888780"/><text x="559" y="100" text-anchor="middle">repository source</text>
</g>
<rect x="668" y="76" width="192" height="38" rx="4" fill="#FCEBEB" stroke="#A32D2D"/>
<text x="764" y="100" text-anchor="middle" font-size="13" fill="#501313">target value withheld</text>

<line x1="450" y1="118" x2="450" y2="148" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="34" y="156" width="832" height="150" rx="6" fill="none" stroke="#AFA9EC" stroke-dasharray="4 3"/>
<text x="50" y="178" font-size="12.5" fill="#534AB7">generic agent · one task-agnostic prompt set · discovers entry point, data convention, metric from source</text>

<g font-size="13" fill="#26215C">
<rect x="58" y="208" width="118" height="46" rx="4" fill="#EEEDFE" stroke="#534AB7"/><text x="117" y="230" text-anchor="middle">navigator</text><text x="117" y="246" text-anchor="middle" font-size="10.5" fill="#534AB7">plan from repo</text>
<rect x="206" y="208" width="118" height="46" rx="4" fill="#EEEDFE" stroke="#534AB7"/><text x="265" y="230" text-anchor="middle">reproducer</text><text x="265" y="246" text-anchor="middle" font-size="10.5" fill="#534AB7">write program</text>
<rect x="354" y="208" width="118" height="46" rx="4" fill="#EEEDFE" stroke="#534AB7"/><text x="413" y="230" text-anchor="middle">critic</text><text x="413" y="246" text-anchor="middle" font-size="10.5" fill="#534AB7">audit vs source</text>
<rect x="502" y="208" width="118" height="46" rx="4" fill="#FAEEDA" stroke="#BA7517"/><text x="561" y="230" text-anchor="middle" fill="#412402">execute</text><text x="561" y="246" text-anchor="middle" font-size="10.5" fill="#854F0B">real env / backend</text>
<rect x="650" y="208" width="118" height="46" rx="4" fill="#EEEDFE" stroke="#534AB7"/><text x="709" y="230" text-anchor="middle">reviewer</text><text x="709" y="246" text-anchor="middle" font-size="10.5" fill="#534AB7">audit vs log</text>
</g>
<g stroke="#534AB7" stroke-width="1.5" marker-end="url(#ahp)" fill="none">
<line x1="176" y1="231" x2="204" y2="231"/>
<line x1="324" y1="231" x2="352" y2="231"/>
<line x1="472" y1="231" x2="500" y2="231"/>
<line x1="620" y1="231" x2="648" y2="231"/>
<path d="M709 208 C709 184 561 184 561 206"/>
</g>
<text x="635" y="180" font-size="11" fill="#534AB7">repair ×N — learns from the real error</text>

<line x1="561" y1="306" x2="561" y2="338" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="571" y="326" font-size="11.5" fill="#5F5E5A">emits per-sample predictions.json</text>

<rect x="300" y="346" width="300" height="54" rx="4" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="450" y="369" text-anchor="middle" font-size="13.5" fill="#04342C" font-weight="500">verifier</text>
<text x="450" y="388" text-anchor="middle" font-size="11.5" fill="#0F6E56">recomputes metric vs pinned gold — ignores printed numbers</text>

<path d="M300 373 H210 V395" stroke="#0F6E56" stroke-width="1.3" fill="none" marker-end="url(#ah)"/>
<text x="150" y="365" font-size="11" fill="#0F6E56">pinned gold</text><text x="150" y="379" font-size="11" fill="#0F6E56">labels</text>

<line x1="395" y1="400" x2="320" y2="446" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#ah)"/>
<line x1="505" y1="400" x2="588" y2="446" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#ah)"/>
<rect x="120" y="452" width="220" height="40" rx="4" fill="#EAF3DE" stroke="#3B6D11"/>
<text x="230" y="470" text-anchor="middle" font-size="12.5" fill="#173404">pass</text>
<text x="230" y="485" text-anchor="middle" font-size="10.5" fill="#3B6D11">a number the verifier produced</text>
<rect x="560" y="452" width="290" height="40" rx="4" fill="#FCEBEB" stroke="#A32D2D"/>
<text x="705" y="470" text-anchor="middle" font-size="12.5" fill="#501313">fail-closed</text>
<text x="705" y="485" text-anchor="middle" font-size="10.5" fill="#A32D2D">wrong count · hardcoded · aggregate-only · malformed</text>
</svg>
