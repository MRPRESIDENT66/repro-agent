[pytest]
testpaths = tests
pythonpath = .
# Fast by default: the unit suite needs no LLM/Docker/network and runs in ~1s.
# Integration tests (a live Docker daemon, etc.) are deselected unless requested
# with `pytest -m integration`.
addopts = -m "not integration"
markers =
    integration: requires external assets (Docker daemon, etc.); deselected by default
